name: Cortex
options:
  bundleIdPrefix: com.moni
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Cortex/Info.plist
    CODE_SIGN_ENTITLEMENTS: Cortex/Cortex.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Cortex:
    type: application
    platform: iOS
    sources:
      - path: Cortex
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moni.cortex
        PRODUCT_NAME: Cortex
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
    entitlements:
      path: Cortex/Cortex.entitlements
    info:
      path: Cortex/Info.plist
