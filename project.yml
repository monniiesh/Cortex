name: Cortex
options:
  bundleIdPrefix: com.moni
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Cortex:
    type: application
    platform: iOS
    sources:
      - Cortex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moni.cortex
        PRODUCT_NAME: Cortex
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        CODE_SIGN_ENTITLEMENTS: Cortex/Cortex.entitlements
    info:
      path: Cortex/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Cortex needs microphone access to record voice notes for transcription and sorting."
        NSSpeechRecognitionUsageDescription: "Cortex uses on-device speech recognition to transcribe your voice recordings."
        NSCalendarsFullAccessUsageDescription: "Cortex creates calendar events from your voice notes when appointments are detected."
        NSRemindersFullAccessUsageDescription: "Cortex creates reminders from your voice notes when time-bound tasks are detected."
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.moni.cortex.processing
          - com.moni.cortex.refresh
        CFBundleURLTypes:
          - CFBundleURLName: com.moni.cortex
            CFBundleURLSchemes:
              - cortex
        UILaunchStoryboardName: ""
