name: Cortex
options:
  bundleIdPrefix: com.moni
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  llama:
    url: https://github.com/StanfordBDHG/llama.cpp
    from: "0.3.3"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Cortex:
    type: application
    platform: iOS
    sources:
      - path: Cortex
        excludes:
          - "**/CLAUDE.md"
          - "**/.claude"
          - "**/tasks"
    dependencies:
      - package: llama
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moni.cortex
        PRODUCT_NAME: Cortex
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        CODE_SIGN_ENTITLEMENTS: Cortex/Cortex.entitlements
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        OTHER_SWIFT_FLAGS: "-cxx-interoperability-mode=default"
    info:
      path: Cortex/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Cortex needs microphone access to record voice notes for transcription and sorting."
        NSCalendarsFullAccessUsageDescription: "Cortex creates calendar events from your voice notes when appointments are detected."
        NSRemindersFullAccessUsageDescription: "Cortex creates reminders from your voice notes when time-bound tasks are detected."
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.moni.cortex.processing
          - com.moni.cortex.refresh
        CFBundleURLTypes:
          - CFBundleURLName: com.moni.cortex
            CFBundleURLSchemes:
              - cortex
        UILaunchStoryboardName: ""
